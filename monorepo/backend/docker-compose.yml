name: morelatto

services:
  db:
    image: postgres:16-alpine
    container_name: morelatto_db
    environment:
      POSTGRES_USER: morelatto
      POSTGRES_PASSWORD: morelatto_secret_2024
      POSTGRES_DB: morelatto_db
    volumes:
      - morelatto_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morelatto -d morelatto_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: morelatto_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://morelatto:morelatto_secret_2024@db:5432/morelatto_db
    ports:
      - "8001:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  morelatto_postgres_data:
