# ==========================================================
# CONFIGURACIÓN INICIAL - HTTP SOLO (antes de SSL)
# ==========================================================
# Esta configuración se usa PRIMERO para obtener el certificado SSL
# Después de obtener el certificado, usar morelatto-ssl.conf
# ==========================================================

server {
    listen 80;
    listen [::]:80;

    # CAMBIAR por tu dominio real
    server_name api.morelatto.com;

    # Location para validación de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Temporalmente redirigir todo el tráfico al backend
    # (después de SSL, mover esto a morelatto-ssl.conf)
    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers (FastAPI ya los maneja, pero por si acaso)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;

        # Timeouts para operaciones largas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ==========================================================
# PASOS SIGUIENTES:
# ==========================================================
# 1. Desplegar esta configuración
# 2. Obtener certificado SSL con: ./scripts/setup-ssl.sh tu-dominio.com
# 3. Una vez obtenido el certificado, renombrar este archivo a morelatto-http.conf.disabled
# 4. Activar morelatto-ssl.conf
# 5. Reiniciar Nginx
# ==========================================================
