version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: morelatto_db_prod
    restart: always
    environment:
      POSTGRES_USER: morelatto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CAMBIAR_EN_PRODUCCION}
      POSTGRES_DB: morelatto_db
    volumes:
      - morelatto_postgres_data:/var/lib/postgresql/data
      - ./backups:/backups  # Para backups de base de datos
    networks:
      - morelatto_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morelatto -d morelatto_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No exponemos el puerto para mayor seguridad
    # Solo accesible dentro de la red Docker

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: morelatto_api_prod
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://morelatto:${POSTGRES_PASSWORD:-CAMBIAR_EN_PRODUCCION}@db:5432/morelatto_db
    volumes:
      # Volumen para certificados AFIP
      - ./certs:/app/certs:ro
      # Volumen para archivos subidos (comprobantes, imágenes)
      - ./uploads:/app/uploads
      # NO montamos app/ en producción para evitar cambios accidentales
    depends_on:
      db:
        condition: service_healthy
    networks:
      - morelatto_network
    ports:
      - "127.0.0.1:8000:8000"  # Solo accesible desde localhost (Nginx)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: morelatto_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # Volumen para servir archivos estáticos si es necesario
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - api
    networks:
      - morelatto_network

  certbot:
    image: certbot/certbot
    container_name: morelatto_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  morelatto_network:
    driver: bridge

volumes:
  morelatto_postgres_data:
    driver: local
